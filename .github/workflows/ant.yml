name: Java CI with SQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build with Ant and SQL tasks
      run: ant -noinput -buildfile build.xml
      env:
        DB_URL: jdbc:mysql://localhost:3306/management
        DB_USERNAME: root
        DB_PASSWORD: toor
